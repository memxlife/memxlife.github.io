# Chapter 1  
# Machine Learning Systems: Questions, Constraints, and Vertical Integration

Modern artificial intelligence is not merely a breakthrough in modeling; it is the emergence of a new large-scale optimization problem that spans mathematics, software, hardware, and physics. The intelligence we seek to build is not realized in isolation, but through systems that must execute, store, and communicate vast amounts of structured computation under strict physical limits. Machine Learning Systems is therefore fundamentally a cross-layer, end-to-end optimization problem and discipline. The largest opportunities for improvement often lie at the algorithmic level, where the structure of computation itself can be reshaped. Yet every such opportunity is bounded by constraints imposed by system software and, most decisively, by hardware and the underlying laws of physics. This chapter establishes the intellectual foundation for this field. In the first part, we proceed through a deliberate sequence of critical questions to uncover the core challenges that make machine learning systems difficult: workload evolution, high-dimensional structure, tensor dominance, memory hierarchy, communication bottlenecks, and physical scaling limits. In the second part, we construct a structural map of the discipline—from GPU architecture and programming models to compilers, distributed training, inference systems, model optimization, and data lifecycle—so that each topic in this book is understood as a component of a vertically integrated system. The purpose of this chapter is therefore twofold: to cultivate disciplined, cross-layer thinking, and to frame machine learning systems as a unified optimization problem governed by evolving workloads and immutable constraints.

---

# Part I  
# Critical Questions: What Makes Machine Learning Systems Hard?

This chapter begins not with definitions, but with questions.

The purpose of this first part is not to teach techniques. It is to train a mode of thinking. Machine Learning Systems is not a collection of tools to memorize. It is a way of reasoning about computation under evolving workloads and physical constraints. If students do not first internalize the intellectual structure of the problem, then every technical topic that follows will appear disconnected and ad hoc.

We therefore begin with a sequence of carefully constructed questions. Each question uncovers a deeper layer of the problem. Each answer reveals a constraint that cannot be ignored. Only after walking through these questions carefully can we understand why vertical integration is not optional but necessary.

---

## 1.1 Why Is Computer System Design Difficult?

We begin with a deceptively simple question.

Why is computer system design difficult?

At first glance, the answer appears obvious. Modern computing systems are extraordinarily complex. A single GPU contains tens of billions of transistors. A data center may contain tens of thousands of such devices. Software stacks span operating systems, drivers, compilers, runtime systems, and distributed coordination layers. Surely, such complexity must explain the difficulty.

But complexity alone does not fully account for the challenge.

Many systems in nature are extraordinarily complex yet remarkably stable. A biological organism is complex. A planetary system is complex. Complexity, by itself, does not explain why designing a computer system is fundamentally difficult. The deeper issue lies not in size, but in uncertainty.

To see this clearly, we must consider time.

A modern processor or accelerator typically requires two to three years from architectural conception to deployment. During that period, workloads evolve. Algorithms improve. New model architectures emerge. Entire paradigms may shift. The hardware that reaches the market in a given year was designed years earlier under assumptions that may no longer hold.

This creates a fundamental asymmetry between design and deployment.

When we design a system, we are not designing it for today’s workload. We are designing it for a workload that will exist in the future.

This temporal gap is the true source of difficulty in system design.

If a system is optimized for the wrong workload, its inefficiency is not marginal. Memory hierarchy, interconnect topology, arithmetic units, numerical formats, and even power distribution are all shaped by workload assumptions. When those assumptions fail, the architecture becomes misaligned with reality.

Thus we arrive at a foundational principle of this discipline:

A good system design begins with predicting the future workload.

This statement is not philosophical rhetoric. It is a structural constraint. Every architectural decision embeds an implicit forecast about what computation will dominate.

If artificial intelligence increasingly defines future workloads, then understanding Machine Learning Systems must begin with a deeper question:

What is the computational nature of intelligence?

---

## 1.2 What Is the Workload of Intelligence?

If system design depends on predicting future workloads, then we must confront a more fundamental question:

What is the computational nature of intelligence?

To answer this question, we must momentarily set aside implementation details and focus on structure. Artificial intelligence systems operate on raw data: images, audio signals, text sequences, sensor measurements, and increasingly multimodal combinations of these modalities. The raw input to modern AI models is extraordinarily high-dimensional. An image of moderate resolution may contain millions of pixels. A short audio segment may consist of thousands of time samples per second. A language model may process sequences containing thousands of tokens, and during training it may see trillions of such tokens.

At first glance, one might conclude that intelligence is simply about processing large amounts of high-dimensional data. But that conclusion is incomplete.

Consider a simple observation. Although raw data is high-dimensional, the meaningful structure within that data appears highly constrained. The space of all possible images is vast, yet natural images occupy a tiny manifold within that space. The space of all possible word sequences is astronomically large, yet grammatical and semantically coherent sentences form a small structured subset. Similarly, in physical systems, sensor data is governed by underlying dynamical laws that restrict feasible states.

This suggests a hypothesis that is central to machine learning:

Intelligence consists of discovering compact structure embedded within high-dimensional spaces.

To explore the computational consequences of this hypothesis, we formalize it.

Suppose we observe data vectors $x \in \mathbb{R}^n$, where $n$ is large. We hypothesize that the essential structure of the data lies approximately within a lower-dimensional subspace of dimension $k$, where $k \ll n$. Let the columns of a matrix $U \in \mathbb{R}^{n \times k}$ form a basis for that subspace.

Our goal is to approximate each data vector $x$ using a linear combination of the basis vectors:

$$
\hat{x} = Uc,
$$

where $c \in \mathbb{R}^k$ is a coefficient vector.

The most natural formulation of this approximation problem is to minimize the squared reconstruction error:

$$
\min_{c} \| x - Uc \|_2^2.
$$

At this stage, we must be precise. The objective is quadratic in $c$, and its minimizer can be obtained by setting the gradient to zero. Taking the derivative with respect to $c$ yields

$$
\nabla_c \| x - Uc \|_2^2 = -2 U^T (x - Uc).
$$

Setting this gradient to zero produces the normal equations:

$$
U^T (x - Uc) = 0.
$$

This condition has a clear geometric interpretation: the residual $x - Uc$ must be orthogonal to the subspace spanned by $U$. Expanding the equation gives

$$
U^T x - U^T U c = 0.
$$

Rearranging terms yields

$$
U^T U c = U^T x.
$$

If the columns of $U$ are linearly independent, then $U^T U$ is invertible, and the solution is

$$
c = (U^T U)^{-1} U^T x.
$$

Substituting back, the reconstructed vector becomes

$$
\hat{x} = U (U^T U)^{-1} U^T x.
$$

The matrix

$$
P_U = U (U^T U)^{-1} U^T
$$

is the projection operator onto the column space of $U$. Thus, learning a representation in this linear framework reduces to learning a projection.

So far, we have assumed that the subspace $U$ is fixed. But in practice, representation learning requires choosing $U$ to best capture the structure of an entire dataset $\{x_i\}_{i=1}^m$.

We therefore consider the global optimization problem:

$$
\min_{U} \sum_{i=1}^m \| x_i - P_U x_i \|_2^2,
$$

subject to appropriate constraints on $U$.

To proceed rigorously, we impose the orthonormality constraint $U^T U = I_k$, which simplifies analysis and ensures that $U$ spans a $k$-dimensional orthonormal subspace.

Under this constraint, the projection simplifies to $P_U = U U^T$, and the reconstruction error becomes

$$
\| x_i - U U^T x_i \|_2^2.
$$

Expanding this expression yields

$$
\| x_i \|_2^2 - \| U^T x_i \|_2^2.
$$

Summing over all samples and dividing by $m$, we obtain

$$
\frac{1}{m} \sum_{i=1}^m \| x_i \|_2^2 - \frac{1}{m} \sum_{i=1}^m \| U^T x_i \|_2^2.
$$

The first term is independent of $U$. Therefore, minimizing reconstruction error is equivalent to maximizing

$$
\frac{1}{m} \sum_{i=1}^m \| U^T x_i \|_2^2.
$$

We now introduce the empirical covariance matrix

$$
\Sigma = \frac{1}{m} \sum_{i=1}^m x_i x_i^T.
$$

Observe that

$$
\frac{1}{m} \sum_{i=1}^m \| U^T x_i \|_2^2
= \frac{1}{m} \sum_{i=1}^m x_i^T U U^T x_i
= \mathrm{Tr}(U^T \Sigma U).
$$

Thus, the representation learning problem reduces to

$$
\max_{U^T U = I_k} \mathrm{Tr}(U^T \Sigma U).
$$

To solve this constrained optimization problem, we consider the eigen-decomposition of the symmetric matrix $\Sigma$:

$$
\Sigma = V \Lambda V^T,
$$

where $\Lambda$ is diagonal with eigenvalues $\lambda_1 \ge \lambda_2 \ge \cdots \ge \lambda_n$, and $V$ contains the corresponding orthonormal eigenvectors.

One can show, either by direct substitution or by invoking the Rayleigh–Ritz theorem, that the trace $\mathrm{Tr}(U^T \Sigma U)$ is maximized when the columns of $U$ are chosen as the eigenvectors corresponding to the largest $k$ eigenvalues.

Therefore, the optimal representation subspace is spanned by the top $k$ principal components.

This is principal component analysis.

The purpose of this derivation is not historical. It is structural.

Even in this simplest linear setting, learning structure reduces to a small set of computational primitives: matrix multiplication, covariance accumulation, orthogonal projection, and eigenvalue decomposition. Each of these operations is built upon large-scale tensor contractions.

Modern deep neural networks extend far beyond linear PCA. They introduce nonlinear activations, hierarchical composition, attention mechanisms, and optimization through gradient descent. Yet if one inspects the internal computation carefully, a striking fact emerges: the overwhelming majority of arithmetic operations still consist of linear transformations applied to high-dimensional tensors.

The mathematical form has changed, but the computational skeleton remains.

Thus, if intelligence consists of discovering compact structure in high-dimensional data, and if discovering that structure reduces computationally to repeated linear transformations, then the workload of modern machine learning systems must be dominated by tensor operations.

We have now answered the first fundamental question: what are we actually computing?

A new question naturally follows.

If tensor operations dominate the workload, what operation dominates the cost?

---

## 1.3 If Intelligence Is Linear Algebra, What Is the Dominant Operation?

In the previous section, we established that even the simplest formulation of representation learning reduces to projections and eigenvalue problems, and that modern neural networks, despite their nonlinear structure, are computationally dominated by linear transformations applied to high-dimensional tensors.

We now sharpen that statement.

If the computational skeleton of intelligence consists of linear transformations, then we must ask:

What specific operation dominates these transformations in practice?

To answer this, we inspect the internal structure of a modern large-scale model, such as a transformer.

A transformer layer consists of two major components. The first is the attention mechanism, in which input tokens are linearly projected into query, key, and value spaces. The similarity between tokens is computed through dot products, producing an attention matrix. That matrix is then multiplied by value vectors to produce aggregated representations. The second component is a feed-forward network, typically consisting of two large linear layers separated by a nonlinear activation.

Every one of these steps involves dense matrix multiplications.

Consider a batch of input tokens represented as a matrix $X \in \mathbb{R}^{BL \times d}$, where $B$ is the batch size, $L$ is sequence length, and $d$ is hidden dimension. A weight matrix $W \in \mathbb{R}^{d \times d}$ transforms these activations via

$$
X' = X W.
$$

This is a matrix multiplication.

In the attention mechanism, queries and keys are projected:

$$
Q = X W_Q, \quad K = X W_K.
$$

The attention scores are computed by

$$
S = Q K^T.
$$

This is again a matrix multiplication.

Then, after softmax normalization, values are combined:

$$
O = \text{Softmax}(S) V.
$$

This is yet another matrix multiplication.

The feed-forward network applies two more dense transformations of similar scale.

Thus, in a single transformer layer, the overwhelming majority of arithmetic operations are dense matrix multiplications.

When this layer is stacked dozens of times, and when the model width $d$ grows into the thousands or tens of thousands, the arithmetic burden becomes enormous.

At this point, one might be tempted to say: if matrix multiplication dominates, then optimizing matrix multiplication solves the problem.

But this intuition requires careful examination.

To understand the real workload, we must quantify not only arithmetic, but also memory footprint.

### Parameter Scale and Memory Reality

Let us consider a moderately sized transformer configuration. Suppose the hidden dimension $d$ is 2048. Suppose there are 24 layers. Suppose the vocabulary size is 50,000. Suppose sequence length is 1024 and batch size is 8.

These numbers are not extreme by today’s standards. In fact, they are modest.

Let us estimate the number of parameters.

A single dense linear layer of size $d \times d$ contains $d^2$ parameters. For $d = 2048$, this is approximately 4 million parameters. In a transformer layer, there are multiple such matrices: projections for queries, keys, values, output projection, and two matrices in the feed-forward network. Altogether, a single layer may contain on the order of 10–20 million parameters.

With 24 layers, the model easily exceeds one billion parameters.

If each parameter is stored in 16-bit floating-point format, that is two bytes per parameter. One billion parameters therefore occupy approximately two gigabytes of memory for weights alone.

But weights are not the only memory requirement.

During training, we must also store activations from the forward pass so that gradients can be computed during backpropagation. For a sequence length of 1024 and batch size of 8, the activation tensor at each layer contains

$$
8 \times 1024 \times 2048
$$

elements. That is roughly 16 million elements per layer. At two bytes per element, that is roughly 32 megabytes per layer. With 24 layers, forward activations alone consume hundreds of megabytes.

But training does not stop there.

Gradients must be stored. Optimizers such as Adam maintain additional state for each parameter, typically including first and second moments, often stored in higher precision. These optimizer states can double or triple memory requirements for parameters.

When all components are accounted for—parameters, gradients, optimizer states, activations—the total memory footprint of even a “small” billion-parameter model can approach tens of gigabytes.

This is a crucial insight.

The dominant operation may be matrix multiplication, but the dominant constraint may be memory capacity and bandwidth.

Arithmetic operations are transient; data structures must persist.

### Arithmetic vs Data Movement

Let us now return to arithmetic.

Multiplying two $N \times N$ matrices using the naive algorithm requires $O(N^3)$ multiply-accumulate operations. This seems computationally intensive. However, modern accelerators can perform trillions of such operations per second.

If arithmetic were the only concern, scaling models would simply require faster arithmetic units.

But every multiply-accumulate requires two operands to be available locally. If those operands reside in slow global memory, they must be fetched before arithmetic can occur. If the result cannot remain in fast on-chip memory, it must be written back.

Thus, the cost of matrix multiplication is not solely determined by the number of arithmetic operations. It is also determined by how efficiently data can be moved between levels of memory hierarchy.

The theoretical arithmetic complexity does not capture this cost.

To understand the practical bottleneck, we must distinguish between computation-bound and memory-bound workloads.

If the time to perform arithmetic dominates total runtime, the workload is computation-bound. If the time to fetch and store data dominates, the workload is memory-bound.

Matrix multiplication, when properly blocked and tiled, has high arithmetic intensity. That is, each loaded element can participate in many arithmetic operations before being evicted. In such cases, arithmetic units can be fully utilized.

However, large-scale model training is not a single isolated matrix multiplication. It is a sequence of operators connected by intermediate tensors. Between each operator, data may need to be written to and read from global memory.

Moreover, distributed training introduces communication between devices, further amplifying data movement costs.

Thus, while matrix multiplication dominates arithmetic, data movement dominates system-level cost.

This observation leads us to a deeper and more subtle question.

If matrix multiplication is highly optimized in hardware, and if arithmetic is abundant, then why does lowering numerical precision not always yield proportional speedups in training?

The answer lies in the asymmetry between linear and nonlinear components, and in the cost of moving intermediate data.

But before addressing that, we must examine the physical cost of data movement itself.

That is the subject of the next section.

---

## 1.4 If Matrix Multiplication Is Simple, Why Is AI Hard?

Up to this point, the argument might appear to suggest a straightforward conclusion. Intelligence reduces to repeated linear transformations. Linear transformations reduce to matrix multiplication. Matrix multiplication is a well-understood operation with decades of hardware optimization behind it. Therefore, accelerating intelligence should be “just” a matter of executing matrix multiplications faster.

But this reasoning hides a critical simplification.

Matrix multiplication, when written mathematically, appears as a compact symbolic expression:

$$
C_{ij} = \sum_k A_{ik} B_{kj}.
$$

On paper, this is an elegant and finite expression. In hardware, however, each term in that summation requires data to be physically present at a compute unit. The computation cannot occur in abstraction; it must occur in silicon, at a location in space, with electrons moving through wires.

This distinction between symbolic computation and physical execution is where difficulty emerges.

Let us examine what it means to perform a matrix multiplication on real hardware.

Suppose we multiply two dense matrices $A \in \mathbb{R}^{N \times N}$ and $B \in \mathbb{R}^{N \times N}$. The naive algorithm requires $N^3$ multiply-accumulate operations. If we consider only arithmetic, the computational cost appears enormous. However, modern accelerators can perform trillions of multiply-accumulate operations per second. Arithmetic units are abundant.

But arithmetic units do not operate in isolation. They require operands. Every multiplication requires fetching two numbers. Every accumulation requires storing an intermediate result. If those numbers reside far from the compute unit, they must be transferred.

To understand why this matters, we must consider the memory hierarchy.

Modern accelerators are built around a hierarchy of storage levels. At the top are registers, extremely fast and energy-efficient, but tiny in capacity. Slightly below are small on-chip SRAM structures, such as shared memory or L1 cache. Below that are larger on-chip caches. Beyond the chip lies high-bandwidth memory, and beyond that system memory. Each level offers a trade-off between capacity, latency, and energy cost.

The fundamental constraint is that large memory cannot be simultaneously fast, cheap, and energy-efficient. Physics imposes a trade-off. Moving bits across longer distances consumes more time and more energy.

To appreciate the magnitude of this effect, consider the following comparison. The energy required to fetch a word from off-chip DRAM can be comparable to the energy required to perform hundreds of multiply-accumulate operations. Similarly, the latency to access DRAM can be hundreds or even a thousand processor cycles, whereas accessing a register may take only a handful of cycles.

This difference is not a small constant factor. It is orders of magnitude.

Thus, even though matrix multiplication is arithmetic-intensive in theory, its practical performance depends critically on how data is moved and reused.

This leads to an essential concept in performance analysis: arithmetic intensity.

Arithmetic intensity measures the number of arithmetic operations performed per byte of data moved. A computation with high arithmetic intensity performs many operations for each byte fetched from memory, thereby amortizing the cost of data movement.

Matrix multiplication, when implemented with proper tiling, can achieve high arithmetic intensity. A block of matrix $A$ loaded into fast memory can be reused multiple times when multiplying against blocks of matrix $B$. The same element participates in many multiply-accumulate operations before being evicted.

However, large-scale machine learning workloads are not single isolated matrix multiplications. They are sequences of operators connected by intermediate tensors.

Between each linear layer, activations must be passed forward. During training, those activations must be stored for backpropagation. Gradients must be accumulated. Optimizer states must be updated. In distributed settings, tensors must be communicated across devices.

Even if each individual matrix multiplication is implemented efficiently, the surrounding data movement may dominate.

To make this more concrete, imagine a forward pass through a transformer layer. The input activations are multiplied by weight matrices to produce new activations. Those activations are then passed to a nonlinear function such as softmax or GELU. The result is then fed into another linear transformation.

If intermediate results are written back to global memory between each operator, then the cost of memory traffic may outweigh the cost of arithmetic.

Therefore, the central systems question is not merely how many multiply-accumulate operations we can perform per second. It is how many bytes we must move per second, and at what energy cost.

This distinction fundamentally reshapes our understanding of difficulty.

When students first encounter large models, they often focus on the number of parameters. They ask how many floating-point operations are required. But a systems designer asks a different question:

How much data must move, and how far must it travel?

This is the point at which we must confront the relationship between computation and communication.

### Computation Versus Communication

In classical computer science, algorithm analysis focuses on computational complexity. We count operations and measure asymptotic growth. But in large-scale machine learning systems, asymptotic arithmetic complexity is not the only metric that matters.

Consider again the multiplication of two $N \times N$ matrices. The arithmetic complexity is $O(N^3)$. The storage requirement for the matrices is $O(N^2)$. The ratio of arithmetic operations to stored elements scales with $N$. For large $N$, this ratio is high. That suggests matrix multiplication should be computation-bound.

Yet real systems often become communication-bound.

Why?

Because arithmetic units can be scaled more easily than memory bandwidth. Because moving data across chips, boards, or racks is far more expensive than performing arithmetic locally. Because intermediate results may be generated and consumed by different operators that reside in different memory locations.

As systems scale from a single GPU to multiple GPUs and then to entire clusters, communication overhead grows rapidly. Collective communication operations such as all-reduce, which are required for gradient synchronization, introduce latency and bandwidth demands that can dwarf local computation time.

This phenomenon has been captured succinctly in a statement often attributed to Ken Batcher:

A supercomputer is a device for turning compute-bound problems into I/O-bound problems.

The statement is both humorous and profound. As we accelerate arithmetic, we expose communication as the dominant cost. As we scale parallelism, synchronization and data transfer become the new bottlenecks.

Thus, the difficulty of AI is not that matrix multiplication is hard. The difficulty is that executing matrix multiplication at extreme scale requires orchestrating data movement under severe physical constraints.

### Staying Local

Given this reality, much of modern systems optimization revolves around a single principle: stay local.

Staying local means structuring computation so that data, once fetched into fast memory, is reused as many times as possible before being evicted. It means fusing operators to avoid writing intermediate tensors back to global memory. It means overlapping computation with data transfer to hide latency. It means reducing numerical precision when appropriate to decrease bandwidth requirements.

These strategies do not change the mathematics of the model. They change how efficiently the mathematics can be executed within physical limits.

At this point, we can answer the central question of this section.

Matrix multiplication is simple as an abstract mathematical operation. It is difficult at scale because data movement, not arithmetic, governs performance.

But this realization introduces another question.

If the primary bottleneck arises from physical constraints—energy, latency, bandwidth—can we rely on continued hardware scaling to alleviate these pressures?

To answer that, we must examine the historical trajectory of semiconductor technology and the limits imposed by physics.

We now turn to that question.

---

## 1.5 Can Hardware Scaling Solve the Problem?

At this point in our reasoning, a natural question emerges.

If arithmetic is abundant but data movement is expensive, perhaps future hardware improvements will resolve the imbalance. Perhaps faster memory, denser integration, or new fabrication technologies will restore equilibrium between computation and communication.

For decades, such optimism would have been justified. The history of semiconductor technology has been defined by extraordinary and sustained performance growth. To evaluate whether that growth can continue to rescue inefficient workloads, we must examine the physical foundations of hardware scaling.

The most widely cited empirical observation in semiconductor history is Moore’s Law. It states that the number of transistors that can be placed on a chip doubles approximately every eighteen to twenty-four months. For many years, this doubling translated into real performance gains.

But transistor count alone does not determine performance. To understand performance, we must examine switching speed and power consumption.

The dynamic power consumed by a transistor during switching can be approximated by the relation

$$
P \propto C V^2 f,
$$

where $C$ is the capacitance being charged or discharged, $V$ is the supply voltage, and $f$ is the switching frequency.

In early generations of semiconductor scaling, when transistor dimensions were reduced, several favorable effects occurred simultaneously.

First, shrinking physical dimensions reduced capacitance $C$. Smaller transistors required less charge to switch states.

Second, supply voltage $V$ could be reduced proportionally. Lower voltage reduced power quadratically.

Third, shorter channel lengths allowed higher switching frequencies $f$.

The remarkable consequence of this coordinated scaling, often referred to as Dennard scaling, was that power density remained approximately constant across generations. As transistors became smaller, chips could run faster without overheating.

For decades, this created a powerful expectation: future processors would be both denser and faster. Performance improvements were not merely incremental; they were compounded.

However, this scaling regime eventually encountered fundamental limits.

As transistor dimensions entered the deep nanometer regime, physical effects that had previously been negligible became dominant. Leakage current increased significantly. Transistors in their “off” state no longer behaved as ideal open circuits. Lowering supply voltage further became difficult because it reduced noise margins and exacerbated leakage.

As a result, voltage scaling stalled. Once voltage could no longer decrease proportionally with transistor size, the dynamic power equation imposed a hard constraint. Increasing frequency $f$ directly increased power consumption.

Around the mid-2000s, this led to a plateau in processor clock speeds. Frequency scaling, which had been a primary driver of performance improvement, effectively ended. Chips could no longer run significantly faster without exceeding thermal limits.

This moment is often described as the “power wall.”

The end of frequency scaling forced a paradigm shift in architecture design. If single-core frequency could not increase, performance gains had to come from parallelism. Instead of building one faster core, designers began building many moderately fast cores.

This shift from frequency scaling to parallel scaling had profound implications.

Parallelism is highly effective for workloads that can be decomposed into many independent operations. Dense matrix multiplication is such a workload. Each output element can be computed independently once its operands are available.

Thus, the end of frequency scaling indirectly favored architectures optimized for throughput rather than single-thread latency.

Graphics processing units, which had already evolved toward massively parallel execution for rendering workloads, were well positioned to capitalize on this shift. They offered hundreds or thousands of arithmetic units capable of executing simple operations in parallel.

However, parallel scaling introduced its own constraint.

As we increase the number of parallel execution units, we increase the demand for data. Each unit must be supplied with operands. Each result must be stored or forwarded. If memory bandwidth does not scale proportionally, execution units will stall while waiting for data.

In other words, the power wall did not eliminate bottlenecks. It relocated them.

When frequency scaling ended, memory and communication constraints became more visible. When parallelism increased, communication costs grew more rapidly.

Thus, the historical trajectory of hardware scaling teaches us a crucial lesson.

Hardware improvements are not unbounded. They are constrained by physical law. When one bottleneck is removed, another emerges at a different layer.

The implication for Machine Learning Systems is clear.

We cannot rely on hardware scaling alone to solve inefficiencies in algorithm design or data movement. We must design systems that align with physical constraints from the outset.

This realization leads naturally to the next question.

If parallelism became the primary strategy after frequency scaling ended, and if AI workloads are highly parallelizable, why did GPUs emerge as the dominant platform?

We now turn to that question.

---

## 1.6 Why Did GPUs Win?

We have just seen that frequency scaling ended due to the power wall, and that the industry responded by increasing parallelism. When performance could no longer be extracted from faster clocks, it had to be extracted from more simultaneous operations.

But parallelism alone does not determine architectural dominance. Many architectures can be parallel. The critical question is not simply how many cores exist, but whether the architecture aligns with the structure of the workload.

To understand why GPUs became central to machine learning, we must examine two contrasting architectural philosophies.

Traditional CPUs are designed for general-purpose workloads characterized by complex control flow, irregular memory access patterns, and strong single-thread latency requirements. A CPU core contains sophisticated mechanisms for branch prediction, speculative execution, out-of-order scheduling, and large cache hierarchies to minimize latency. Much of the silicon area in a CPU is devoted not to arithmetic units, but to control logic and memory systems that optimize unpredictable programs.

This design philosophy is highly effective for tasks such as operating systems, databases, compilers, and general software applications. These workloads are dominated by control decisions, pointer chasing, and sequential dependencies. In such settings, minimizing single-thread latency is essential.

In contrast, GPUs evolved under a different assumption. Graphics workloads consist of applying similar operations to large numbers of pixels or vertices. The computation is regular. The same instruction is often applied to many data elements in parallel. Control flow is relatively simple and predictable.

As a result, GPU architecture emphasizes throughput over latency. Instead of a small number of complex cores, GPUs contain a large number of simpler cores organized into streaming multiprocessors. Instead of investing heavily in speculative execution and deep control logic, GPUs invest heavily in arithmetic units. Rather than minimizing memory latency through complex caches, GPUs hide latency through massive hardware multithreading.

When one thread stalls waiting for memory, another can be scheduled. This model assumes that enough independent work exists to keep arithmetic units busy even if individual threads experience delays.

Now consider the workload of modern machine learning, as analyzed in Sections 1.2 and 1.3.

Dense matrix multiplication is highly regular. It involves repeated multiply-accumulate operations across large arrays. The computation exhibits high degrees of parallelism. Data access patterns can be structured and predictable when properly tiled. Arithmetic intensity can be high if locality is exploited.

In other words, the workload of deep learning aligns far more naturally with the GPU architectural philosophy than with the CPU’s.

This alignment explains the initial success of GPUs in machine learning. But alignment alone is not sufficient. GPUs also evolved in response to AI workloads.

As deep learning models grew larger, hardware vendors introduced specialized tensor cores to accelerate matrix multiplications in mixed precision. Numerical formats such as half precision and bfloat16 were incorporated to reduce memory bandwidth requirements while maintaining acceptable model accuracy. High-bandwidth memory technologies were integrated directly into accelerator packages to provide the data throughput required by large tensor operations.

The architecture adapted because the workload demanded it.

However, it is important to understand that GPUs did not win solely because they were faster in raw floating-point operations. They won because their design philosophy matched the structure of the dominant workload.

This distinction matters.

An architecture optimized for single-thread latency will struggle to exploit the parallelism inherent in tensor operations. An architecture optimized for throughput can scale effectively as model sizes increase, provided memory bandwidth and communication infrastructure evolve accordingly.

The emergence of GPUs as the dominant AI platform therefore illustrates a deeper principle.

Architectural success depends on alignment with workload structure.

As long as tensor operations dominate the workload, architectures optimized for parallel linear algebra will maintain an advantage.

But this observation does not imply that GPUs are permanently optimal. It implies that architecture must continually adapt to the evolving computational structure of intelligence.

The question then becomes more subtle.

Even though GPUs are well aligned with tensor workloads, and even though they have improved dramatically over the past decade, why does hardware improvement alone still fail to keep pace with model scaling?

To answer that, we must examine the relationship between workload growth and hardware growth more carefully.

---

## 1.7 Why Is Hardware Improvement Not Enough?

We have established that tensor operations dominate the workload of modern machine learning systems and that GPUs align well with this structure. We have also seen that the end of frequency scaling led to massive parallelism and that GPU architecture evolved to support high-throughput linear algebra.

Given this alignment, one might expect hardware progress to naturally accommodate the scaling of model size and training demand. Yet empirical evidence suggests otherwise.

To understand why, we must compare two growth curves: the growth of workload demand and the growth of single-device performance.

Over the past decade, the computational demand required to train state-of-the-art models has increased dramatically. The scale of training compute for leading transformer-based models has grown by multiple orders of magnitude. Model sizes have expanded from millions of parameters to billions, then to hundreds of billions, and now to trillions. Sequence lengths have increased. Dataset sizes have expanded from billions of tokens to trillions.

This growth is not incremental; it is exponential.

During the same period, individual GPU performance has improved significantly. Advances in process technology, numerical precision, architectural enhancements such as tensor cores, and larger die sizes have delivered substantial gains. Single-chip inference performance, for example, has improved by roughly three orders of magnitude over a decade.

However, if model training demand increases by approximately seven orders of magnitude while single-device performance increases by three, there remains a gap of four orders of magnitude.

That gap cannot be closed by waiting for the next generation of silicon.

It must be closed by scaling across devices.

This is the origin of distributed training at scale.

Instead of training a model on one accelerator, we distribute the computation across hundreds or thousands. Parameters are partitioned. Activations are split. Gradients are aggregated. Collective communication primitives such as all-reduce become central operations. Network topology and bandwidth become critical performance factors.

The moment we distribute computation, a new class of constraints emerges.

Within a single device, data movement is constrained by memory hierarchy. Across devices, data movement is constrained by interconnect bandwidth and latency. As the number of devices increases, synchronization overhead grows. Communication patterns become complex. The cost of moving tensors across racks may rival or exceed the cost of computing them.

Thus, scaling horizontally does not eliminate bottlenecks. It shifts them.

To appreciate the inevitability of this shift, consider a simple example. Suppose a model’s parameters are partitioned across multiple GPUs using tensor parallelism. During the forward pass, intermediate results must be communicated between devices to complete a single layer’s computation. During backpropagation, gradients must be synchronized. These operations require collective communication across devices.

If communication bandwidth is insufficient, arithmetic units idle while waiting for data. The theoretical peak performance of each GPU becomes irrelevant if the network cannot sustain the required throughput.

This phenomenon explains why modern accelerator systems devote increasing attention to interconnect design. Technologies such as NVLink, NVSwitch, and high-speed InfiniBand fabrics exist to reduce the gap between local computation and distributed coordination.

Yet even with sophisticated interconnects, communication remains fundamentally constrained by physics. Signals propagate at finite speed. Bandwidth increases require more wires, more energy, or more complex encoding. Latency across racks cannot be reduced below physical limits.

The implication is unavoidable.

Single-device hardware improvements, even when substantial, cannot keep pace with exponential workload growth. Distributed computation becomes necessary. Distributed computation introduces communication as a dominant cost. Communication is bounded by physical constraints.

Thus, we confront a structural scaling gap.

Arithmetic abundance does not guarantee scalable intelligence. Memory bandwidth and interconnect topology become first-class design concerns.

This realization prepares us for a deeper strategic question.

If hardware improvements alone cannot close the scaling gap, where should we focus our effort to achieve meaningful gains?

We now turn to that question.

---

## 1.8 Where Is the Real Optimization Opportunity?

At this stage, a thoughtful reader may ask a practical question.

If hardware scaling is bounded by physical law, and if distributed systems introduce communication bottlenecks that cannot be eliminated entirely, then where should we invest effort to achieve meaningful performance improvement?

The answer requires nuance.

Hardware innovation remains important. Improvements in process technology, packaging, memory bandwidth, and interconnect design continue to yield performance gains. However, such improvements are incremental. A new process node may reduce energy consumption or increase density by a certain percentage. A new interconnect may offer higher bandwidth. A new tensor core design may improve throughput for specific operations.

These advances are valuable, but they operate within physical constraints. They rarely produce order-of-magnitude improvements in system-level efficiency on their own.

System software optimization also plays a critical role. Improved kernel scheduling, operator fusion, better tiling strategies, and more intelligent communication overlap can deliver substantial gains. Compiler frameworks and runtime systems continue to mature, extracting better performance from existing hardware.

Yet software optimization is ultimately constrained by the structure of the underlying algorithm and the capabilities of hardware.

The largest leverage often lies elsewhere.

Consider what happens when we alter the algorithmic structure of the model itself.

If we reduce numerical precision from 32 bits to 16 bits, we halve memory footprint and double effective bandwidth. If we further reduce precision to 8 bits or lower while maintaining accuracy, we shrink data movement dramatically. If we introduce sparsity, we reduce both computation and storage. If we factorize weight matrices into low-rank components, we decrease parameter count. If we design architectures that require fewer sequential dependencies, we improve parallel scalability.

These changes do not merely optimize execution. They reshape the workload.

By modifying the algorithm, we change the balance between computation and communication. We alter arithmetic intensity. We reduce memory traffic. We influence how well the workload aligns with hardware architecture.

This is why algorithm-level innovation can produce disproportionate gains.

However, algorithmic freedom is not absolute.

An algorithm that introduces highly irregular sparsity patterns may be difficult to exploit efficiently on existing hardware. An algorithm that requires sequential operations may underutilize parallel execution units. A numerical format that is too aggressive in precision reduction may degrade model quality beyond acceptable limits.

Thus, while the algorithm layer offers the largest optimization opportunity, it must operate within boundaries imposed by system software and hardware.

The relationship between layers is asymmetrical but interdependent.

Algorithms determine the structure and volume of computation. Software determines how that computation is mapped and scheduled. Hardware determines the physical limits of execution.

Algorithm-level decisions can amplify or mitigate hardware constraints. Hardware constraints can enable or restrict algorithmic choices.

This dynamic interplay defines vertical co-design.

Vertical co-design is not simply collaboration between teams. It is a conceptual framework in which every layer is understood as both opportunity and constraint. The algorithm layer provides the greatest freedom to reshape workload structure. The software layer translates structure into executable plans. The hardware layer enforces immutable physical limits.

When these layers are optimized in isolation, inefficiencies emerge. When they are optimized together, order-of-magnitude improvements become possible.

This is the core thesis of Machine Learning Systems.

The field is not about writing faster code alone. It is not about building larger accelerators alone. It is about recognizing that intelligence is a large-scale optimization problem that must be solved end-to-end, across layers, under evolving workloads and physical limits.

We are now prepared to formalize what this discipline encompasses.

---

## 1.9 What Is Machine Learning Systems?

Having walked through workload structure, memory hierarchy, physical scaling limits, architectural alignment, distributed scaling, and cross-layer optimization, we can now articulate a formal definition.

Machine Learning Systems is the discipline concerned with designing, implementing, and operating intelligent systems across computing scales, through cross-layer optimization of algorithms, system software, and hardware, under evolving workloads and immutable physical constraints.

Several elements of this definition deserve emphasis.

First, it spans computing scales. The same principles that govern data-center-scale training influence edge inference systems. The constraints differ in magnitude, but not in nature.

Second, it emphasizes cross-layer reasoning. No single layer suffices. Algorithmic innovation without system awareness may be impractical. Hardware design without workload alignment may be wasteful. Software abstraction without understanding of memory and communication costs may introduce hidden inefficiencies.

Third, it recognizes evolution. Workloads change. Architectures adapt. Software stacks evolve. The discipline must remain dynamic.

This completes the first part of the chapter.

We began with deceptively simple questions. We uncovered structural asymmetries between design and deployment. We formalized the high-dimensional nature of intelligence. We identified tensor operations as dominant workload primitives. We examined the physical cost of data movement. We analyzed the end of frequency scaling and the rise of parallelism. We explained the architectural alignment of GPUs with AI workloads. We quantified the scaling gap and its distributed implications. Finally, we articulated the central thesis of vertical co-design.

We are now ready to shift perspective.

In the second part of this chapter, we will map the intellectual territory of Machine Learning Systems. Having understood why the field exists, we now examine what it contains and how its components interrelate.
