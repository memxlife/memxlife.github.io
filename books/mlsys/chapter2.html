# CPU Foundations, GPU Emergence, and the Logic of Throughput Computing

In Chapter 1, we argued that Machine Learning Systems is fundamentally a cross-layer optimization discipline. The dominant opportunities often appear at the algorithmic level, but those opportunities only become real when they can be implemented efficiently through system software and hardware. We also argued that modern machine learning workloads are increasingly dominated by large-scale tensor operations, while communication, storage, and data movement constraints increasingly govern end-to-end performance. That framing now forces a more concrete question. If learning systems are ultimately executed on real machines, what kinds of machines are they, why were they designed the way they were, and why did the center of gravity move from the CPU toward the GPU?

This chapter answers that question by reconstructing the logic rather than merely listing architectural facts. The CPU did not become important by accident, and the GPU did not replace the CPU for machine learning simply because it has "more cores." Each architecture is a response to a particular optimization problem. The CPU is the outcome of decades of work on extracting performance from irregular, latency-sensitive, control-heavy programs. The GPU is the outcome of a different trajectory: workloads with abundant regularity, massive data parallelism, and a premium on total throughput rather than single-thread latency. To understand modern machine learning systems, one must understand both.

The narrative of this chapter therefore moves in two stages. First, we revisit the CPU as a highly optimized latency machine. We examine how performance is decomposed, how pipelining increases utilization, how branch prediction and out-of-order execution recover instruction-level parallelism, how compilers expose vector-level structure, and how locality organizes the memory hierarchy. Second, we show why these mechanisms, however brilliant, eventually hit a wall on tensor-dominated workloads. At that point the architectural objective changes. Instead of squeezing ever more performance out of a single complicated thread, the system is redesigned to sustain immense numbers of simple operations in parallel. That is the world in which the GPU becomes natural.

A final theme runs through the whole chapter. Architecture is not only about hardware. It is about the joint fit among workload, hardware organization, and software abstraction. This will matter when we reach unified shader architectures and CUDA. The decisive transition in GPU history was not just a bigger chip. It was the moment when a throughput-oriented machine acquired a sufficiently powerful programming model to escape its original graphics niche and become the computational backbone of modern AI.

---

## 2.1 Machine Learning Systems Again: Why Architecture Matters

Before descending into CPU and GPU details, it is useful to restate the systems context in the language of this course. Machine Learning Systems is not a synonym for "deep learning on hardware," nor is it reducible to compiler engineering, distributed systems, or accelerator design in isolation. It is the discipline of designing, implementing, and operating intelligent systems across a vertically integrated stack, always with scalability in mind. In that stack, algorithms, system software, runtime, compiler, architecture, network, and storage are not separate universes. They are coupled design variables.

This coupling matters because the largest optimization opportunities are often not where beginners expect them to be. If one changes the algorithmic structure of the workload, the gains can easily be one order of magnitude, sometimes even two. By contrast, system software optimizations often deliver factors of two or three, and hardware architectural gains per generation are often smaller still. This does not mean hardware is unimportant. It means that hardware and software define the feasible region in which algorithmic ideas can become practically valuable. A mathematically elegant idea that violates the constraints of the execution substrate may look transformative on paper and deliver little in deployment.

The lecture emphasizes this through a simple example: sparsity. From the algorithmic perspective, pruning can look wonderful. If a model can lose a large fraction of its parameters while maintaining accuracy, one might expect immediate acceleration. But hardware does not accelerate zeros in the abstract. It accelerates regular structure. If sparsity is unstructured, memory accesses become irregular, data layouts become awkward, and the underlying execution engine may gain almost nothing. By contrast, when sparsity conforms to hardware-friendly patterns, such as structured block sparsity or restricted formats like 2:4 sparsity, the hardware can actually exploit it. The lesson is fundamental: optimization is vertical. The algorithm can only cash in its theoretical savings when the lower layers know how to realize them.

This leads directly to why architecture matters in a machine learning systems course. The objective is not to memorize CPU or GPU diagrams for their own sake. The objective is to understand how workload structure propagates downward into machine organization. Matrix multiplication provides a beautiful example. For dense matrices of dimension n, the arithmetic work grows as O(n^3), while the communication surface grows more slowly, roughly as O(n^2). This means that as the problem becomes large, there is an opportunity to push the workload toward computation-rich execution. That is exactly why dense linear algebra has been such a fruitful target for high-performance systems. At the same time, the opportunity only materializes if the architecture can supply data efficiently enough, which immediately brings us back to hierarchy, locality, bandwidth, and latency.

The lecture also makes a strategic point that is easy to overlook: architecture is a prediction problem. Designing a processor is not about the workload of today alone. A new chip often takes multiple years from concept to deployment. By the time that chip is in the field, it must be relevant to the workload of that future moment. This means architecture is always built under uncertainty about how applications will evolve. That is one reason this course repeatedly insists that systems researchers must understand the learning workload itself. Without a strong model of what future algorithms will demand, architectural choices become guesses.

So the question of CPU versus GPU is not merely a hardware comparison. It is a study in how computer systems respond when the center of gravity of the workload shifts. Once machine learning becomes dominated by large, regular tensor operations, some architectural techniques become less central and others become decisive. The rest of the chapter explains that transition carefully.

## 2.2 Performance as an Optimization Decomposition

Any serious treatment of architecture should begin with performance, but performance must be made analyzable. If we only say that one processor is fast and another is slow, we have no design handle. The classical CPU decomposition provides that handle:

Execution Time = Instruction Count x Cycles Per Instruction x Clock Cycle Time.

This equation is not merely a formula to memorize. It is a conceptual map. It tells us that program performance can improve in at least three distinct ways. We can reduce the number of instructions the machine must execute. We can reduce the average number of cycles needed per instruction. Or we can shorten the duration of each cycle. Different architectural ideas attack different factors.

This decomposition is useful because it prevents confused thinking. Suppose a new microarchitectural feature slightly increases instruction count, because the compiler must generate more bookkeeping instructions, but reduces CPI dramatically by exposing parallelism. That can still be a net win. Conversely, suppose a design increases clock frequency but does so by introducing deeper pipelines, more stalls, and a higher branch misprediction penalty. Then the benefit of shorter cycles may be offset by a higher CPI. Architecture is full of such trade-offs, and the decomposition gives us a language for reasoning about them.

The lecture frames CPU optimization precisely this way. The end-user metric is usually elapsed time, but the system designer decomposes that elapsed time into factors that correspond to concrete mechanisms. Pipelining primarily attacks cycle time and utilization. Branch prediction attacks control-related stalls and therefore CPI. Out-of-order execution attacks dependency-induced stalls and therefore CPI. Compiler transformations such as loop unrolling can reduce effective instruction overhead and expose more independent work, again reducing CPI. Better data locality reduces the waiting time associated with memory, which indirectly improves CPI as well.

It is important to notice that this decomposition already reflects a CPU worldview. The CPU is fundamentally concerned with the progress of a thread of control. An instruction is the central semantic object, and performance is analyzed in terms of how efficiently that thread moves through the machine. This is exactly the right model for a general-purpose processor. But as the chapter progresses, we will see that the dominant metric changes for throughput machines. In a GPU or tensor-oriented setting, one often cares less about the latency of a single operation than about the sustained rate at which large ensembles of operations are completed. That shift in objective will eventually force a different decomposition.

Still, the CPU decomposition is the right place to start because it teaches a deeper methodological lesson. Good architecture work rarely improves performance by magic. It improves performance by identifying the bottlenecked term in an explicit factorization and then changing the machine so that term shrinks. The architecture story of the CPU is, in large part, the story of one clever way after another to reduce CPI without breaking general-purpose correctness.

In modern large-scale machine learning systems, one of the most widely used metrics for evaluating GPU efficiency is Model FLOPs Utilization (MFU). The purpose of MFU is to measure how effectively a training workload converts the theoretical computational capacity of the hardware into useful model computation. GPUs used for deep learning contain extremely high peak floating-point throughput, primarily delivered by specialized hardware units such as Tensor Cores that accelerate matrix multiplications. However, achieving peak hardware performance in practice is difficult. MFU therefore provides a structured way to reason about where performance is lost.

Conceptually, MFU can be decomposed into three multiplicative components that correspond to different layers of the machine learning system stack. The first component measures kernel or hardware efficiency, the second measures algorithmic compute density, and the third measures system-level parallel efficiency. Together these factors explain how theoretical peak performance degrades into the actual performance observed during training.

The first factor, kernel or hardware efficiency, reflects how efficiently matrix multiplication kernels utilize the underlying compute hardware. Mathematically, this component can be expressed as the ratio between the optimal matrix multiplication time and the actual measured matrix multiplication time. The optimal time represents the execution time that would be achieved if the GPU were operating perfectly at its peak FLOP throughput, while the actual time reflects the real performance of the kernel implementation. This ratio therefore measures how close the executed GEMM (General Matrix Multiply) operations come to saturating the hardware’s computational capacity. Several factors influence this efficiency. The shapes of matrices play an important role, since aspect ratios and tile sizes determine how well computations map onto the fixed geometry of Tensor Core multiplier arrays. Data layout also matters: contiguous memory layouts, proper alignment, and avoiding unnecessary transposes can significantly improve throughput. Precision choices such as FP16, BF16, or FP8 also affect how effectively Tensor Cores can be used. Finally, kernel fusion techniques—such as fusing bias addition or GELU activation into the matrix multiplication epilogue—can further improve hardware utilization by reducing memory traffic and kernel launch overhead.

The second factor, algorithmic compute density, describes how much of the model’s total compute time is spent performing matrix multiplications as opposed to other operations. This component can be expressed mathematically as the ratio between matrix multiplication time and the total compute time. Even if matrix multiplication kernels themselves are highly efficient, the overall system performance can still suffer if a significant fraction of computation is spent in operations that do not map well to Tensor Core hardware. In modern transformer models, most computation ideally occurs inside GEMM operations, such as those implementing query–key–value projections, feedforward networks, and output projections. However, models also include many elementwise operations—such as GELU activations, layer normalization, and dropout—as well as reductions and indexing operations. The attention mechanism introduces additional operations such as softmax normalization and masking. These operations typically have lower arithmetic intensity and cannot utilize Tensor Cores as effectively as matrix multiplications. As a result, increasing the fraction of computation that occurs in GEMMs—either through algorithm design or kernel fusion—can significantly improve MFU.

The third factor, system and parallel efficiency, captures how much of the total training step time is spent performing useful computation rather than waiting for communication or synchronization. This component is expressed as the ratio between compute time and the sum of compute time and communication time. In distributed training systems, GPUs frequently need to exchange data across devices to synchronize gradients or model parameters. Operations such as all-reduce for gradient aggregation can introduce communication overhead that reduces effective hardware utilization. Similarly, synchronizing optimizer states across devices or maintaining parameter consistency across replicas may introduce additional latency. Pipeline-parallel training can suffer from pipeline bubbles if different stages are imbalanced. At the system level, CPU–GPU synchronization delays, kernel launch overhead, and memory bandwidth limitations can also reduce efficiency. Interconnect bandwidth—whether through HBM memory bandwidth inside the GPU or NVLink communication between GPUs—often becomes a limiting factor in large-scale training clusters.

Taken together, these three components explain how theoretical hardware performance translates into actual training throughput. The overall MFU can be understood as the product of hardware efficiency, algorithmic compute density, and system parallel efficiency. When MFU is high, it indicates that the machine learning system—from algorithm design to kernel implementation to distributed infrastructure—is well aligned with the hardware architecture. When MFU is low, it signals that inefficiencies exist somewhere in the stack, whether in kernel implementation, model structure, or distributed system communication. For practitioners building large-scale training systems, MFU therefore serves not only as a performance metric but also as a diagnostic tool for identifying optimization opportunities across the entire machine learning systems stack.

## 2.3 From Instruction Execution to Pipelining

Once performance is decomposed, the next question is operational: how does a CPU actually execute an instruction stream? The pedagogical answer begins with the classic five-stage pipeline: instruction fetch, instruction decode and register read, execute, memory access, and write-back. No real modern CPU is this simple, but the model is extraordinarily useful because it reveals the main idea.

If one executes an instruction from start to finish before beginning the next, the hardware is badly underutilized. During fetch, the decode hardware sits idle. During execution, the fetch hardware sits idle. During memory access, the ALU sits idle. Most of the machine is waiting most of the time. This is the same kind of waste one would see in a factory where each product occupies the entire assembly floor even though only one workstation is active at a given moment.

Pipelining solves this by overlapping different instructions across different stages. Once the first instruction advances from fetch to decode, the fetch hardware can immediately begin working on the second instruction. A few cycles later, the pipeline contains multiple instructions in flight, each at a different stage. The latency of a single instruction through the pipeline may not decrease much, but the throughput of the processor improves because the expensive hardware stages are now busy much more of the time.

The lecture explains this in a direct way: without pipelining, an instruction typically occupies only a fraction of the available hardware resources at any instant. Pipelining is therefore first and foremost a utilization strategy. The addition of pipeline registers at stage boundaries also has another benefit. By isolating combinational paths, the hardware designer can shorten the critical path per stage and therefore increase the allowable clock frequency. In other words, pipelining often helps both utilization and cycle time.

But pipelining is not free. As soon as multiple instructions are active simultaneously, hazards appear. Structural hazards occur when two instructions want the same resource. Data hazards occur when one instruction depends on a value that another has not yet produced. Control hazards occur when the next instruction to fetch is uncertain because a branch has not yet resolved. The simple elegance of pipelining immediately creates a new layer of complexity: the machine now requires mechanisms to keep the overlap productive.

What matters pedagogically is that this is the first example of a general architectural pattern. We identify idle hardware, we overlap independent work, and then we invent machinery to manage the conflicts that overlap creates. This pattern will reappear later in very different form on the GPU, where large numbers of threads are used to hide latency. The specific mechanisms differ, but the underlying logic is the same: exploit concurrency to keep expensive hardware busy.

It is also useful to recognize the philosophical boundary of pipelining. Pipelining does not create new algorithmic parallelism. It reorganizes the execution of an instruction stream so that independent stages can be occupied simultaneously. The machine is still fundamentally centered on a thread of control. To go further, one must begin extracting parallelism from within and across instructions themselves.

---

## 2.4 Branch Prediction, Out-of-Order Execution, and Superscalar Design

Pipelining increases utilization, but once a pipeline exists, the next obstacle is that real programs are full of irregularity. Branches interrupt the smooth flow of instructions. Dependencies force later operations to wait for earlier results. Memory latencies are not always short or predictable. If the machine naively stalled whenever such uncertainty appeared, much of the promise of pipelining would vanish. This is where the classic CPU toolbox enters.

Branch prediction addresses control hazards. When the processor encounters a conditional branch, it can either wait until the condition is resolved or speculate about which path is more likely. Waiting preserves certainty but wastes cycles. Prediction risks mistakes but preserves momentum. Modern CPUs overwhelmingly choose prediction because, on average, keeping the pipeline full is worth the occasional rollback. Good branch predictors therefore act as statistical models of control flow, using history to guess the future. In a sense, the CPU performs a tiny online learning problem simply to keep the hardware fed.

Out-of-order execution addresses a different issue. Even when the program order contains dependencies, not all pending instructions are blocked at the same time. Some later instructions may already have their operands available and may target otherwise idle units. If the machine insists on strict in-order execution, that potential parallelism is wasted. Out-of-order execution breaks this rigidity. The CPU dynamically tracks dependencies, issues ready instructions when their operands and execution units are available, and later retires results in an order consistent with the architectural state. This is a remarkable idea: the hardware is no longer merely executing instructions; it is performing dynamic scheduling on behalf of the program.

Superscalar design builds on the same principle. If multiple independent instructions are ready in the same cycle and the machine contains multiple execution units, then the CPU can issue several instructions at once. This pushes instruction-level parallelism further, but it also raises the bar for the front end, dependency tracking logic, and register renaming machinery. The wider the machine becomes, the more difficult it is to find enough independent instructions to fill it and the more complex the supporting control logic becomes.

The lecture presents these mechanisms as a family of answers to the same underlying problem: a general-purpose instruction stream contains only limited visible parallelism, so the processor must work aggressively to uncover and exploit it. The CPU becomes, in effect, a speculation-and-scheduling engine wrapped around arithmetic units. This is one reason high-performance CPU cores are so sophisticated and so energy-expensive. They are doing enormous amounts of work simply to keep a relatively small number of execution units productive on irregular code.

This also explains why the CPU is so good at workloads with complex control structure. If the program contains branches, pointer chasing, heterogeneous operations, and moderate working sets, the CPU's dynamic intelligence can preserve good performance where simpler machines would stall badly. But the chapter is gradually building toward a contrast. On a highly regular workload such as large matrix multiplication, much of this dynamic machinery becomes less valuable relative to its area and power cost. If the workload is already regular, predictable, and massively parallel, one may prefer to spend silicon on arithmetic and bandwidth rather than on speculation logic.

---

## 2.5 The Software Side: Loop Unrolling and Vectorization

CPU performance is not created by hardware alone. The compiler and the programmer shape the structure of the executed instruction stream, and on modern systems that influence is substantial. Two ideas are especially important in the lecture: loop unrolling and vectorization.

Consider a simple loop that applies the same arithmetic operation element by element across an array. In its naive form, the loop includes loop-control instructions every iteration: increment the index, compare against the bound, branch back if not done. These instructions are necessary, but they do not directly contribute to the arithmetic payload. They are overhead. If the compiler unrolls the loop, one logical iteration of loop control can govern multiple arithmetic operations. The instruction stream becomes larger locally, but the ratio of useful work to bookkeeping improves.

More importantly, unrolling often exposes additional independent operations to the hardware. Once several iterations are visible together, the out-of-order engine and superscalar scheduler have a better chance of finding work that can proceed in parallel. In this sense, compiler transformations and microarchitectural mechanisms are partners. The compiler restructures the code to reveal parallelism; the hardware exploits it dynamically.

Vectorization takes the idea a step further. If the same operation is applied to multiple data elements, then instead of issuing one scalar instruction per element, the machine can issue a vector instruction that operates on several packed values at once. SIMD - single instruction, multiple data - is an old idea, but it remains central because many numerical kernels contain exactly this pattern. On a CPU, vectorization can increase arithmetic density dramatically when the data layout is friendly and the operation is regular enough.

The lecture's conceptual point is that CPU performance improvement happens on both sides of the hardware-software interface. Hardware alone cannot manufacture parallel work that the instruction stream does not expose, and software alone cannot extract performance if the hardware is too weak to exploit the structure it reveals. This theme foreshadows later GPU programming, where the responsibility for exposing parallelism and locality becomes even more explicit.

There is also a subtle lesson here about regularity. The more regular the computation, the easier it becomes for software transformations to express it and for hardware to accelerate it. Machine learning workloads often contain exactly this kind of regularity, especially in dense tensor operators. That is why vectorization on CPUs is a useful bridge concept. It shows, in miniature, how architectures begin to favor data-parallel computation when the workload permits it.

Still, CPUs remain constrained by their original mission. Even after vectorization, a CPU core is still a latency-sensitive, general-purpose machine. The architecture is trying to improve arithmetic throughput without abandoning flexibility. Eventually the workload will become so regular and so massively parallel that a more radical reallocation of silicon becomes attractive.

---

## 2.6 Data Locality and the Logic of the Memory Hierarchy

So far the discussion has focused on the processing side of the machine: instructions, issue, speculation, scheduling, and arithmetic. But a processor is only as effective as its ability to obtain data. In practice, memory is not a flat resource. Different storage levels provide different capacity, bandwidth, latency, and energy trade-offs. The memory hierarchy exists because no single storage technology simultaneously offers the speed of registers, the capacity of DRAM, and the cost profile needed for large systems.

The key principle that makes the hierarchy work is locality. Programs often reuse recently accessed data and often access nearby data soon after one another. These two phenomena - temporal locality and spatial locality - allow the system to keep a relatively small working set in fast storage close to the processor while the rest remains farther away. Registers serve the innermost hot data. Caches try to capture the near-term working set. Main memory stores the much larger bulk state. Secondary storage sits below that.

The lecture emphasizes that caches are not magic accelerators. They are prediction devices. A cache is useful only when the system can correctly anticipate, through locality patterns, what data should be kept close. When locality is strong, caches make memory appear much faster than the raw latency of DRAM would suggest. When locality is weak or access patterns are irregular, the illusion breaks and the processor stalls.

This is why locality is not a side topic. It is one of the deepest bridges between algorithms and systems. A matrix multiplication algorithm that reuses tiles effectively may perform vastly better than a naive implementation with the same arithmetic complexity, simply because it increases data reuse and reduces costly movement through the hierarchy. Tiling, blocking, and layout transformations are therefore not low-level hacks; they are essential ways of shaping a workload so that it aligns with the memory system.

At this point one can already see a tension building inside the CPU design. The processor is using caches, branch prediction, out-of-order execution, and speculative logic to make irregular programs run well. But every one of those mechanisms has a cost in area, power, and complexity. If the workload were more predictable, some of that machinery could be reduced. If the access pattern were streaming and the parallelism abundant, one might rely less on hardware prediction and more on software-managed organization. That observation points directly toward the GPU philosophy.

The lecture makes this contrast explicitly later: for highly regular throughput workloads, especially dense tensor operators, predictability can be high enough that software scheduling, explicit tiling, and structured movement of data become preferable to large general-purpose caches. This is not because caches are bad. It is because the workload has moved into a regime where a different balance between hardware automation and software control becomes optimal.

## 2.7 Why the CPU Reaches a Limit

By this point the CPU appears extraordinarily capable, and indeed it is. It pipelines instructions, predicts branches, executes out of order, issues multiple instructions per cycle, uses vector instructions, and leans on a carefully layered memory hierarchy. So why is it not the ideal engine for modern machine learning?

The answer is not that the CPU is weak. It is that the CPU is optimized for a different objective. Its design center is low-latency progress on a relatively small number of complex threads. The machine spends substantial silicon and energy budget on logic whose purpose is to recover parallelism from irregularity: speculation, dependency tracking, reorder buffers, issue logic, branch handling, and cache machinery. This is exactly the right choice when the workload is branchy, heterogeneous, and not massively parallel. But when the workload becomes a sea of regular tensor operations, the trade-off changes.

Large matrix multiplication is the canonical example. A dense tensor kernel often has enormous data parallelism, relatively simple control, and predictable access structure after blocking. In such a setting, one cares less about shaving a few cycles off the progress of a single instruction stream and more about sustaining a huge rate of arithmetic over many independent data elements. The KPI shifts from single-thread latency to system throughput.

The lecture states this shift very clearly. In a CPU-style world, performance is commonly judged by how quickly one thread executes its sequence of instructions. In a throughput-computing world, what matters is how many useful operations the system can complete over a large workload. Once that becomes the objective, some of the CPU's greatest strengths turn into relative inefficiencies. Why devote so much transistor budget to aggressive branch prediction if the kernel barely branches? Why build elaborate out-of-order machinery if the operation is already organized as regular data-parallel blocks? Why optimize for the fastest possible single thread if thousands of threads are available?

There is also a physical constraint. Single-thread performance improvements through frequency scaling and ever-deeper complexity eventually run into power and thermal limits. The historical free lunch of simply raising clock frequency ended long ago. As a result, sustaining higher total performance increasingly requires concurrency rather than frequency alone. The workload must be parallelized, and the architecture must be built to exploit that parallelism efficiently.

This does not eliminate the CPU. On the contrary, CPUs remain essential for orchestration, control-intensive code, operating systems, runtime logic, and many mixed workloads. But it does explain why CPUs cease to be the natural dominant engine once machine learning becomes the central application. The problem is not that CPUs cannot perform matrix multiplication. They certainly can. The problem is that their microarchitectural budget is not allocated in the most advantageous way for this class of workload. That is where the GPU enters.

## 2.8 GPU Was Born Differently

The GPU should not be understood as a CPU with more cores. It embodies a different architectural philosophy from the beginning. The lecture captures this with a sharp contrast: for the GPU, throughput matters and single threads do not. That statement is slightly provocative, but it contains the essence. The GPU does not ignore individual threads completely; rather, it refuses to optimize the entire machine around the latency of one complicated thread.

If the workload contains huge numbers of similar operations, then the architecture can be simplified in one direction and amplified in another. Instead of spending large fractions of silicon on dynamic scheduling, heavy speculation, and large control structures, the machine can devote much more silicon to arithmetic units, wide data paths, and the ability to support vast numbers of concurrent threads. Memory latency is then hidden not primarily through speculative single-thread intelligence, but through thread-level parallelism. When one group of threads waits on memory, another can run.

This is a profound change in viewpoint. The CPU tries hard to make one thread appear fast. The GPU assumes no single thread is special and instead ensures that the machine as a whole remains productive. The lecture highlights several consequences of this choice. First, high clock frequency is not the main route to performance. Running many simpler execution units at more moderate frequency is often better under power constraints. Second, memory management becomes more explicit. Rather than relying exclusively on large, opaque hardware-managed caches, the GPU increasingly exposes storage hierarchy details to software and expects programmers or compilers to organize data movement consciously. Third, predictability becomes a design advantage. Streaming workloads with regular structure allow the system to prefetch, tile, and overlap movement with computation much more effectively.

The lecture also makes a valuable pedagogical comparison. If one starts conceptually from a CPU-like core and removes much of the heavyweight out-of-order machinery, speculative complexity, and large cache dependence, what remains is a simpler execution engine. Replicate many such engines, organize them around shared front-end structures and large-scale multithreading, and one begins to approach the logic of the streaming multiprocessor. This is not the literal historical path, but it is a powerful way to demystify the GPU. It is not magic hardware. It is what happens when the optimization target changes.

At the same time, the GPU's emergence is not purely an AI story. Historically, it was shaped by graphics. That history matters because graphics already contained exactly the kind of regular, massively parallel computation that rewarded a throughput-oriented machine. To understand why the GPU was ready for machine learning, one must understand what graphics processing demanded in the first place.

---

## 2.9 From Graphics to General-Purpose Throughput Computing

One of the most illuminating parts of the lecture is that it reconstructs GPU history through graphics rather than jumping directly to deep learning. This is the right narrative because it shows that the GPU's later success in AI was not accidental. The machine was forged by an earlier workload with similar structural properties.

Computer graphics begins with a three-dimensional scene but ends with a two-dimensional image on a screen. To get from one to the other, the system executes a pipeline of geometric and shading computations at very large scale. A useful high-level decomposition is the following. First, objects stored as 3D models are transformed into the scene configuration one wants to render. Second, vertices are assembled into primitives such as triangles. Third, those primitives are rasterized into many small fragments or pixels. Fourth, those fragments are shaded and blended to produce the final image. Even in this simplified description, the massive parallelism is obvious: many vertices can be transformed independently, many triangles can be processed independently, and many fragments can be shaded independently.

The lecture spends time on the transformation stage because it reveals the deep connection to linear algebra. To render an object, one must place it in the world, place the camera, and project the scene onto a two-dimensional viewing plane. In graphics language, this is the MVP chain: model transformation, view transformation, and projection transformation. At the object level, one can think of the process as pose the object, move the camera, take the photo. Mathematically, these are transformations of coordinates.

Even more concretely, the lecture explains that 3D object manipulation can be decomposed into scaling, rotation, and translation. The standard ordering discussed in class is scale first, then rotate, then translate. Each transformation is represented by a matrix, and in homogeneous coordinates the operation on each vertex is realized through repeated matrix-vector multiplication. Once the transformations are concatenated, the rendering pipeline is already doing large amounts of structured linear algebra. This point is extremely important. The GPU later became the dominant engine for deep learning not only because it was programmable, but also because from its graphics origins it had always been built to accelerate precisely this kind of parallel numerical workload.

This perspective also clarifies why the early GPU pipeline was fixed-function. In the earliest graphics era, the workload was relatively well understood and transistor budgets were tight. If the same sequence of rendering stages would be executed for many applications, then hardwiring those stages made sense. Fixed-function hardware offered excellent efficiency for a stable target. Flexibility would have been expensive, and in the early years it was not yet affordable.

As the lecture notes, the evolution proceeded in stages. First came hardwired graphics accelerators. Then came increasingly programmable graphics processors, where pieces such as vertex shading and fragment shading became software-controlled. Finally, with unified execution resources and a more general programming stack, the GPU escaped the narrow graphics pipeline and became a general throughput engine. Once CUDA arrived, the same machine that had excelled at transforming vertices and shading fragments could now be targeted directly for scientific computing, numerical linear algebra, and machine learning.

This is why the historical and architectural stories align so neatly. Graphics demanded massive parallelism, regular numerical kernels, and high arithmetic throughput. Machine learning later demanded much the same thing, only at even larger scale.

---

## 2.10 Programmability, Unified Shaders, and the Meaning of Flexibility

The transition from fixed-function graphics hardware to programmable GPU architectures is one of the decisive moments in computer architecture, and the lecture explains the logic very well. A natural question is why early GPUs were not programmable from the beginning. After all, programmability sounds obviously desirable. The answer is that flexibility has a cost, and in early hardware generations the workload and transistor budget did not yet justify paying that cost.

Two forces eventually changed the equation. The first was application demand. As graphics workloads became more sophisticated, game developers and graphics programmers wanted richer effects, more complex lighting, more varied geometry processing, and more freedom to define the rendering logic. Fixed pipelines became too restrictive. The second force was Moore's law. As transistor budgets increased, the architecture could afford a greater amount of flexible logic without sacrificing all efficiency. In the lecture, this is presented as a very practical answer: once there were enough transistors, the machine could buy programmability.

But programmability alone was not enough. Intermediate generations of GPUs often remained partitioned into separate functional pipelines, such as vertex units and pixel or fragment units. That was already more flexible than pure fixed-function hardware, but it still created an imbalance problem. Different graphics scenes stress different stages in different proportions. If the machine contains a rigid number of vertex processors and a rigid number of fragment processors, one stage may bottleneck while resources in another stage sit underutilized.

Unified shader architecture solved this by pooling execution resources into a common substrate that could be assigned where needed. This was a major conceptual step. The machine no longer treated different shader stages as permanently distinct hardware islands. Instead, it treated them as different kinds of work mapped onto a more uniform execution fabric. Utilization improved because the hardware could adapt to the stage mix of the workload. More importantly for the long run, the architecture became more like a general compute engine and less like a narrow graphics appliance.

This is the deeper meaning of flexibility in architecture. Flexibility is not only about the convenience of programmers. It is also about allowing the machine to maintain high utilization across changing workload mixes. Of course, every increase in flexibility threatens some loss of specialized efficiency. That trade-off never disappears. But the GPU story shows that when the workload family broadens enough, programmable flexibility can create a platform whose total impact far exceeds that of a narrower but slightly more efficient accelerator.

That lesson is directly relevant to modern AI hardware. Domain-specific accelerators can be spectacularly efficient on a narrow operator set, but they risk obsolescence if the workload changes. The GPU's enduring strength lies in how much efficiency it preserves while still remaining programmable enough to adapt. Unified shaders were one of the steps that made that balance possible.

---

## 2.11 CUDA as the Decisive Software Abstraction

If unified shaders made the GPU structurally more general, CUDA made that generality usable. This is why CUDA deserves to be treated not as a peripheral software layer but as a central architectural event. A throughput machine with weak programmability remains trapped inside a niche. A throughput machine with a strong programming model can become a platform.

CUDA did several things at once. It gave programmers a way to express massive parallel work in terms of kernels, thread blocks, and grids. It exposed the hardware's hierarchical execution structure without requiring programmers to think in raw graphics pipeline terms. It gave software a vocabulary for distinguishing different storage levels and encouraged explicit management of locality where needed. And, just as important, it came with an ecosystem: compilers, libraries, debuggers, runtimes, and eventually a vast body of examples and community knowledge.

The lecture emphasizes exactly this point: CUDA is the hardware-software co-design layer that turned NVIDIA from a graphics company into the steward of a general-purpose parallel computing platform. That framing fits the broader thesis of the course perfectly. Hardware alone does not win. Software abstraction alone does not win. What wins is the alignment between the architecture's strengths and the programmer's ability to access them.

It is also worth noting how CUDA matches the GPU philosophy. The GPU wants work to be organized into many similar threads. CUDA asks the programmer to expose that work directly. The GPU relies on structured execution and locality-aware organization. CUDA provides the abstractions through which software can describe those structures. The hardware and the software model are therefore deeply aligned.

This alignment helps explain why the GPU became such a powerful vehicle for machine learning. Large tensor kernels are naturally decomposable into parallel tiles and blocks. Data movement can often be organized through shared-memory tiling and register blocking. Massive numbers of threads can be launched over regular index spaces. In other words, the dominant operations of deep learning map extremely well onto the execution model that CUDA makes available.

The lecture also hints at an important historical asymmetry. Without a good programming model, exploiting a highly parallel machine can require heroic effort and enormous amounts of low-level code. That slows research, narrows the developer base, and reduces practical impact. CUDA lowered that barrier just enough that a large community could build on top of it. Libraries then amplified the effect further. Once the ecosystem matured, the GPU was no longer merely a hardware option; it was the default software-hardware platform for accelerated numerical computing.

This is why the chapter's argument properly ends at CUDA. Once a throughput-oriented architecture is joined with an effective programming abstraction, the system escapes its original domain and becomes a general substrate for future workloads. Machine learning then arrives not as an alien use case, but as the next workload that fits the platform exceptionally well.

---

## 2.12 The Lesson of Chapter 2

We can now summarize the chapter's intellectual arc in a single sentence: the CPU and GPU are different answers to different workload optimization problems.

The CPU is a masterpiece of general-purpose, latency-oriented design. It pipelines instruction execution, predicts control flow, reorders operations dynamically, issues multiple instructions per cycle, exploits SIMD where possible, and relies on a sophisticated hierarchy of caches to make memory appear close. All of these mechanisms are responses to a world in which programs are irregular, branches matter, and useful parallelism is limited and difficult to expose. The CPU therefore spends large resources on dynamic intelligence.

The GPU emerges when the workload changes. If the dominant computation is large-scale, regular, data-parallel numerical processing, then the design center moves away from single-thread cleverness and toward aggregate throughput. Silicon that would once have been invested in elaborate speculation and large cache structures can instead be invested in many more execution resources, much higher arithmetic density, and the ability to keep vast numbers of threads in flight. Memory latency is hidden through concurrency and structured execution rather than primarily through single-thread prediction.

The graphics history is not a side story to this conclusion; it is the proof of concept. Long before deep learning, graphics workloads already demanded enormous amounts of parallel transformation, rasterization, and shading. The MVP pipeline already relied on matrix-based transformations. Scaling, rotation, translation, and projection were already numerical kernels repeated over huge numbers of geometric elements. The GPU therefore learned, through graphics, how to become a machine for massive regular computation. Deep learning later inherited that machine.

The path from fixed-function graphics to programmable shaders, then to unified shaders, and finally to CUDA illustrates a larger architectural principle. Specialized efficiency is powerful, but only up to the point where workload diversity and future uncertainty demand programmability. Once the architecture became sufficiently flexible and the software abstraction became sufficiently usable, the GPU ceased to be just a graphics processor. It became a throughput platform.

That is the real bridge from Chapter 1 into the rest of the book. Chapter 1 established that machine learning systems is a vertically integrated optimization problem. Chapter 2 shows that the hardware layer itself is workload-driven and that one cannot understand modern AI infrastructure without understanding why the GPU became the dominant execution substrate.

The next natural step is therefore to descend inside the GPU itself. We need to understand streaming multiprocessors, SIMT execution, warp scheduling, storage hierarchy, shared memory, registers, tensor cores, tiling, and the optimization logic that sustains modern machine learning throughput. But that discussion only makes sense after the conceptual shift made in this chapter: from latency-centric general-purpose computing to throughput-centric parallel computing, and from fixed-function specialization to programmable platform design.
